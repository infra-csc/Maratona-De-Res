kind = "web"
previewPath = "/"
title = "Maratona de Resultados"
version = "1.0.0"
id = "artifacts/maratona"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23916

[services.development]
run = "pnpm --filter @workspace/maratona run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/maratona", "run", "build" ]
publicDir = "artifacts/maratona/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23916"
BASE_PATH = "/"
