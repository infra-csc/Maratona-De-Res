          description: CSV/TSV with columns nome, nota, evento, data (header optional, auto-detected)
        dryRun:
          type: boolean
          description: Defaults to true. Set to false to commit (only applied when there are zero errors).
        linkOverrides:
          type: object
          additionalProperties:
            type: integer
          description: >-
            Mapa opcional de groupKey (de HistoricalImportEventPlan) para o id de um evento
            existente ao qual esse grupo deve ser vinculado, em vez de criar um evento novo.
            Usado quando o admin identifica manualmente que um evento com action=create do
            preview é, na verdade, a mesma corrida de um dos overlapCandidates sugeridos
            (nome diferente do cadastrado manualmente).

    HistoricalImportOverlapCandidate:
      type: object
      required: [id, name, startDate, endDate, isHistorical]
      properties:
        id:
          type: integer
        name:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        isHistorical:
          type: boolean

    HistoricalImportEventPlan:
      type: object
      required: [eventName, date, score, participantsCount, matchedCount, action, groupKey]
      properties:
        eventName:
          type: string
        date:
          type: string
        score:
          type: number
          nullable: true
        participantsCount:
          type: integer
        matchedCount:
          type: integer
        action:
          type: string
          enum: [create, update, conflict]
        existingEventId:
          type: integer
        cycleId:
          type: integer
        cycleName:
          type: string
        cycleFallback:
          type: boolean
          description: true quando a data do evento não cai no período de nenhum ciclo cadastrado e o evento será vinculado ao ciclo atual como alternativa.
        newEmployeeNames:
          type: array
          items:
            type: string
          description: Nomes de colaboradores deste evento específico que serão cadastrados automaticamente.
        groupKey:
          type: string
          description: Identificador estável do grupo (evento normalizado + data), usado em linkOverrides.
        overlapCandidates:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalImportOverlapCandidate"
          description: >-
            Apenas quando action=create. Eventos já cadastrados cujo período cobre esta data —
            possíveis duplicatas com nome diferente. Não bloqueiam a importação; o admin pode
            escolher vincular a um deles via linkOverrides em vez de criar um evento novo.

    HistoricalImportResult:
      type: object
      required: [success, dryRun, errors, totalRows, matched, unmatched, ambiguous, events]
      properties:
        success:
          type: boolean
        dryRun:
          type: boolean
        errors:
          type: array
          items:
            type: string
        totalRows:
          type: integer
        matched:
          type: integer
        unmatched:
          type: array
          items:
            type: string
        ambiguous:
          type: array
          items:
            type: string
        cycleFallback:
          type: array
          items:
            type: string
          description: Eventos cuja data não cai em nenhum ciclo cadastrado e que serão vinculados ao ciclo atual automaticamente.
        events:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalImportEventPlan"
        employeesToCreate:
          type: array
          items:
            type: string
          description: Nomes de colaboradores não cadastrados que serão criados automaticamente ao confirmar.
        employeesCreated:
          type: integer
          description: Quantidade de colaboradores criados automaticamente (apenas no commit).
        eventsCreated:
          type: integer
        eventsUpdated:
          type: integer
        participantsLinked:
          type: integer
        warnings:
          type: array
          items:
            type: string

    SurveyImportInput:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          items:
            type: array
            items: {}
          description: >-
            Linhas da planilha (sem cabeçalho), cada uma um array de 29
            células na ordem original das colunas do xlsx.
        dryRun:
          type: boolean
          description: Defaults to true. Set to false to commit (only applied when there are zero errors and every group is linked).
        linkOverrides:
          type: object
          additionalProperties:
            type: integer
          description: >-
            Mapa de groupKey (de SurveyGroupPlan) para o id do evento já
            cadastrado ao qual esse grupo da planilha deve ser vinculado.
            Obrigatório para todos os grupos antes do commit — este import
            nunca cria eventos novos.

    SurveyEventSuggestion:
      type: object
      required: [id, name, startDate, isHistorical]
      properties:
        id:
          type: integer
        name:
          type: string
        startDate:
          type: string
        isHistorical:
          type: boolean

    SurveyLinkedEventSummary:
      type: object
      required: [id, name, startDate, isHistorical, status, cycleId]
      properties:
        id:
          type: integer
        name:
          type: string
        startDate:
          type: string
        isHistorical:
          type: boolean
        status:
          type: string
        cycleId:
          type: integer

    SurveyGroupPlan:
      type: object
      required: [groupKey, eventLabel, rowCount, distinctEvaluators, suggestions, resolved]
      properties:
        groupKey:
          type: string
          description: Identificador estável do grupo (texto do evento normalizado), usado em linkOverrides.
        eventLabel:
          type: string
          description: Texto original da coluna Evento+cidade+data da planilha.
        rowCount:
          type: integer
        distinctEvaluators:
          type: integer
        linkedEventId:
          type: integer
        linkedEvent:
          $ref: "#/components/schemas/SurveyLinkedEventSummary"
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/SurveyEventSuggestion"
          description: Eventos já cadastrados sugeridos por semelhança de nome/cidade, para ajudar a escolher o vínculo.
        resolved:
          type: boolean
          description: true quando um linkOverride válido foi informado para este grupo.

    SurveyCatalogChanges:
      type: object
      required: [toDeactivate, toCreateOrActivate]
      properties:
        toDeactivate:
          type: array
          items:
            type: string
          description: Nomes de critérios que serão desativados (active=false) no commit.
        toCreateOrActivate:
          type: array
          items:
            type: string
          description: Nomes de critérios que serão criados ou reativados no commit.

    SurveyCreatedAvaliador:
      type: object
      required: [name, email, tempPassword]
      properties:
        name:
          type: string
        email:
          type: string
        tempPassword:
          type: string
          description: Senha provisória em texto puro, retornada apenas uma vez neste response para o RH distribuir ao avaliador.

    SurveyImportResult:
      type: object
      required: [success, dryRun, errors, totalRows, groups, unresolvedGroups, avaliadoresToCreate, catalogChanges, warnings]
      properties:
        success:
          type: boolean
        dryRun:
          type: boolean
        errors:
          type: array
          items:
            type: string
        totalRows:
          type: integer
        groups:
          type: array
          items:
            $ref: "#/components/schemas/SurveyGroupPlan"
        unresolvedGroups:
          type: array
          items:
            type: string
          description: groupKeys ainda sem vínculo — precisam de linkOverrides antes do commit.
        avaliadoresToCreate:
          type: array
          items:
            type: string
          description: Nomes de avaliadores que serão criados como usuários novos ao confirmar.
        catalogChanges:
          $ref: "#/components/schemas/SurveyCatalogChanges"
        warnings:
          type: array
          items:
            type: string
        usersCreated:
          type: integer
        evaluationsCreated:
          type: integer
        assignmentsCreated:
          type: integer
        conformitiesUpserted:
          type: integer
        eventsUpdated:
          type: integer
        createdAvaliadores:
          type: array
          items:
            $ref: "#/components/schemas/SurveyCreatedAvaliador"
          description: Apenas no commit — credenciais provisórias dos avaliadores criados.

    CsvExport:
      type: object
      required: [filename, data]
      properties:
        filename:
          type: string
        data:
          type: string
