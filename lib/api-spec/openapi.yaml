        name:
          type: string
        email:
          type: string
        role:
          type: string
        areaId:
          type: ["integer", "null"]
        areaName:
          type: ["string", "null"]
        employeeId:
          type: ["integer", "null"]
        active:
          type: boolean
        createdAt:
          type: string

