  /integration/import/survey:
    post:
      operationId: importSurvey
      tags: [integration]
      summary: >-
        Import the evaluator survey spreadsheet (one row = one evaluator's
        answer for one event). Creates avaliador users (deduped by name),
        never auto-creates events (every spreadsheet event must be linked to
        an existing event via linkOverrides), converts numeric 0-10 answers
        into real per-criterion evaluations for non-historical events, turns
        the four Sim/Não questions into event_conformities (worst case
        wins), and stores historical-event comments as importedNotes only.
        Also runs the criteria catalog migration (activate "Carga na Saída
        do Galpão", deactivate 3 retired criteria) inside the commit
        transaction. Always previews (dryRun) unless dryRun=false and there
        are zero validation errors and every group is linked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyImportInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyImportResult"

