<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>body{margin:0}::-webkit-scrollbar{height:6px;width:6px}::-webkit-scrollbar-thumb{background:rgba(128,128,128,.35);border-radius:3px}</style>
</helmet>

<div style="display:flex;height:100vh;overflow:hidden;background:{{theme.bg}};color:{{theme.fg}};font-family:'Barlow',sans-serif;transition:background-color .3s,color .3s">
  <aside style="width:250px;flex-shrink:0;display:flex;flex-direction:column;background:{{theme.card}};border-right:1px solid {{theme.border}}">
    <div style="padding:0 16px;height:64px;flex-shrink:0;display:flex;align-items:center;border-bottom:1px solid {{theme.border}}">
      <div style="display:flex;flex-direction:column">
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;text-transform:uppercase;letter-spacing:-0.02em;line-height:1">Maratona</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:{{theme.accent}};margin-top:4px">Resultados</span>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:24px">
      <sc-for list="{{navGroups}}" as="group" hint-placeholder-count="1">
        <div style="display:flex;flex-direction:column;gap:6px">
          <p style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:{{theme.mutedFg}};margin:0 0 4px 8px">{{group.name}}</p>
          <sc-for list="{{group.items}}" as="item" hint-placeholder-count="2">
            <div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:-0.01em;background:{{item.activeBg}};color:{{item.activeFg}};cursor:pointer">
              <div style="width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:{{item.dotOpacity}}"></div>
              <span>{{item.label}}</span>
            </div>
          </sc-for>
        </div>
      </sc-for>
    </div>
    <div style="padding:16px;display:flex;flex-direction:column;gap:12px;border-top:1px solid {{theme.border}}">
      <div onClick="{{toggleTheme}}" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid {{theme.border}};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:{{theme.mutedFg}};cursor:pointer">
        <div style="width:14px;height:14px;border-radius:50%;border:2px solid currentColor;flex-shrink:0"></div><span>{{themeLabel}}</span>
      </div>
    </div>
  </aside>

  <main style="flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden">
    <div style="padding:18px 24px;border-bottom:1px solid {{theme.border}};display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <h1 style="margin:0;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;text-transform:uppercase;letter-spacing:-0.01em">Como Funciona</h1>
      <button onClick="{{toggleTheme}}" style="height:36px;padding:0 14px;border-radius:8px;border:1px solid {{theme.border}};background:transparent;color:{{theme.mutedFg}};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;cursor:pointer">{{themeLabel}}</button>
    </div>

    <div style="flex:1;min-height:0;overflow:auto;padding:24px;max-width:760px;margin:0 auto;width:100%;box-sizing:border-box">
      <p style="font-size:14px;line-height:1.6;color:{{theme.mutedFg}};margin-bottom:24px">Um guia rápido de como sua nota, elegibilidade e bônus são calculados na Maratona.</p>
      <sc-for list="{{sections}}" as="s" hint-placeholder-count="4">
        <div style="border-radius:12px;border:1px solid {{theme.border}};background:{{theme.card}};padding:20px;margin-bottom:14px">
          <h3 style="margin:0 0 8px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;color:{{theme.accent}}">{{s.title}}</h3>
          <p style="margin:0;font-size:13px;line-height:1.6">{{s.body}}</p>
        </div>
      </sc-for>
    </div>
  </main>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
const darkTokens = { bg: "#0c0c0c", fg: "#f0ede8", card: "#141414", primary: "#d4ff00", primaryFg: "#0c0c0c", secondary: "#1e1e1e", mutedFg: "#7a7a7a", accent: "#d4ff00", border: "rgba(255,255,255,0.08)" };
const lightTokens = { bg: "#f2f1ec", fg: "#111111", card: "#ffffff", primary: "#111111", primaryFg: "#ffffff", secondary: "#e8e6e0", mutedFg: "#888880", accent: "#9ab000", border: "rgba(0,0,0,0.1)" };

const NAV_GROUPS_RAW = [ { name: "Colaborador", items: [ { label: "Meu Desempenho" }, { label: "Como Funciona", active: true } ] } ];

const SECTIONS = [
  { title: "1. Avaliação por Evento", body: "Cada evento é avaliado por critérios distribuídos entre áreas (Atendimento, Cenografia, Logística, Produção). Cada avaliador dá uma nota de 0 a 10 para os critérios da sua área." },
  { title: "2. Calibração", body: "Um gestor revisa as notas dadas pelos avaliadores e pode ajustá-las (calibrar) antes da publicação final, garantindo consistência entre eventos." },
  { title: "3. Nota do Evento", body: "A nota final do evento é a média ponderada das notas calibradas de cada critério, descontando eventuais penalidades de conformidade (EPI, estaiamento, guarda de equipamentos)." },
  { title: "4. Nota Final do Ciclo", body: "Sua nota final é a média das notas dos eventos que você participou no ciclo, ajustada por penalidades e méritos lançados no seu nome." },
  { title: "5. Elegibilidade e Bônus", body: "Você precisa participar de pelo menos 8 eventos no ciclo para ser elegível ao bônus. O valor do bônus depende da faixa (Ouro, Prata, Bronze) em que sua nota final se encaixa." },
];

class Component extends DCLogic {
  state = { isDark: true };
  toggleTheme = () => this.setState(s => ({ isDark: !s.isDark }));

  renderVals() {
    const theme = this.state.isDark ? darkTokens : lightTokens;
    return {
      theme, themeLabel: this.state.isDark ? "Light" : "Dark", toggleTheme: this.toggleTheme,
      navGroups: NAV_GROUPS_RAW.map(g => ({ name: g.name, items: g.items.map(it => ({ label: it.label, activeBg: it.active ? theme.primary : "transparent", activeFg: it.active ? theme.primaryFg : theme.mutedFg, dotOpacity: it.active ? 1 : 0.5 })) })),
      sections: SECTIONS,
    };
  }
}

</script>
</body>
</html>
